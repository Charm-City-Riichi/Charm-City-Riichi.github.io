<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Waits Trainer – Charm City Riichi</title>
  <meta name="description" content="Practice reading chinitsu tenpai hands. A one-suit hand of 13 tiles is shown — select every tile that completes it.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://charm-city-riichi.github.io/practice/waits.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/webp" href="/favicon.webp">
  <link rel="apple-touch-icon" href="/favicon.png">
  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-JzbwfK79eUImOyw0xYv71.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>
</head>
<body>

<div id="site-nav"></div>
<script src="/js/nav-inject.js"></script>

<main class="page-content">
  <h1 class="page-title">Chinitsu Waits Trainer</h1>

  <div class="ccr-card trainer-card">

    <!-- Top: prompt + buttons -->
    <div class="trainer-top">
      <p class="trainer-hint">
        Select every tile that completes this hand, then check your answer.
      </p>
      <div class="trainer-actions">
        <button class="ccr-button" id="wt-check-btn">Check Answer</button>
        <button class="ccr-button ccr-hidden" id="wt-new-btn">New Hand</button>
      </div>
    </div>

    <!-- Hand display -->
    <div class="trainer-row trainer-row--first">
      <span class="trainer-row-label">Hand</span>
      <span class="trainer-row-value" id="wt-hand"></span>
    </div>

    <!-- Tile selector -->
    <div class="trainer-row">
      <span class="trainer-row-label">Waits?</span>
      <div>
        <div class="wt-suit-label" id="wt-suit-label"></div>
        <div id="wt-tile-selector" class="wt-tile-selector"></div>
      </div>
    </div>

    <!-- Result (hidden until checked) -->
    <div id="wt-result" class="ccr-hidden trainer-result-separator">
      <div class="wt-verdict" id="wt-verdict"></div>
    </div>

  </div>

  <div class="callout callout--amber">
    <p class="callout-title">Under Development</p>
    <p>If you run into bugs or have feature requests, please reach out to <strong>fionnagán</strong> on our <a href="https://discord.gg/SzCeUjuGFP" target="_blank" rel="noopener">Discord</a>.</p>
  </div>

</main>

<footer class="site-footer">
  <p>&copy; 2026 Charm City Riichi &middot; <a href="mailto:charmcityriichi@gmail.com">charmcityriichi@gmail.com</a> &middot; <a href="https://discord.gg/SzCeUjuGFP" target="_blank" rel="noopener">Discord</a></p>
</footer>

<script src="/js/nav.js"></script>
<script src="/js/st-core.js"></script>
<script src="/js/st-waits.js"></script>
<script src="/js/st-builder.js"></script>
<script src="/js/st-ui.js"></script>
<script src="/js/wt-solver.js"></script>
<script src="/js/wt-generator.js"></script>
<script src="/js/wt-ui.js"></script>
</body>
</html>
