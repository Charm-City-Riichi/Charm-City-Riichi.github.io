<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Tile Efficiency Trainer – Charm City Riichi</title>
  <meta name="description" content="Practice tile efficiency by choosing optimal discards. A 14-tile hand is shown — pick the discard with the highest ukeire to reach tenpai.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://charm-city-riichi.github.io/practice/efficiency.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/webp" href="/favicon.webp">
  <link rel="apple-touch-icon" href="/favicon.png">
  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-JzbwfK79eUImOyw0xYv71.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>
</head>
<body>

<div id="site-nav"></div>
<script src="/js/nav-inject.js"></script>

<main class="page-content">
  <h1 class="page-title">Tile Efficiency Trainer</h1>

  <div class="ccr-card trainer-card">

    <!-- Top: prompt + button -->
    <div class="trainer-top">
      <p style="margin:0; color: var(--color-text); opacity: 0.75; font-size: 0.9rem;">
        Click a tile to discard it. Try to reach tenpai with the fewest, most efficient discards.
      </p>
      <div class="trainer-actions">
        <button class="ccr-button ccr-hidden" id="et-new-btn">New Hand</button>
      </div>
    </div>

    <!-- Hand display: 13 sorted + 1 drawn -->
    <div class="trainer-row" style="margin-top: 1.25rem;">
      <span class="trainer-row-label">Hand</span>
      <span class="trainer-row-value et-hand-area">
        <span id="et-hand" class="et-hand-group"></span>
        <span class="et-draw-separator"></span>
        <span id="et-draw" class="et-draw-group"></span>
      </span>
    </div>

    <!-- Debug info (for verification against external calculators)
    <div id="et-debug" class="et-debug"></div> -->

    <!-- Result (hidden until game ends) -->
    <div id="et-result" class="et-result ccr-hidden"></div>

    <!-- Discard log -->
    <div id="et-log" class="et-log ccr-hidden"></div>

  </div>

  <div class="callout callout--amber">
    <p class="callout-title">Under Development</p>
    <p>If you run into bugs or have feature requests, please reach out to <strong>fionnag&aacute;n</strong> on our <a href="https://discord.gg/SzCeUjuGFP" target="_blank" rel="noopener">Discord</a>.</p>
  </div>

</main>

<footer class="site-footer">
  <p>&copy; 2026 Charm City Riichi &middot; <a href="mailto:charmcityriichi@gmail.com">charmcityriichi@gmail.com</a> &middot; <a href="https://discord.gg/SzCeUjuGFP" target="_blank" rel="noopener">Discord</a></p>
</footer>

<script src="/js/nav.js"></script>
<script src="/js/st-core.js"></script>
<script src="/js/st-ui.js"></script>
<script src="/js/et-shanten.js"></script>
<script src="/js/et-core.js"></script>
<script src="/js/et-ui.js"></script>
</body>
</html>
