  <main class="page-content">
    <h1 class="page-title">Scoring</h1>
    <h1 class="page-title">Scoring</h1>

    <div class="ccr-calculator-container">
      <div class="ccr-card">
        <div class="ccr-header">
          <h2>Score Calculator</h2>
        </div>

        <div class="ccr-form-group">
          <label>Were you the dealer?</label>
          <div class="ccr-radio-group">
            <label><input type="radio" name="dealer" value="yes" checked> Yes</label>
            <label><input type="radio" name="dealer" value="no"> No</label>
          </div>
        </div>

        <div class="ccr-form-group">
          <label>Did you win by tsumo (self-draw)?</label>
          <div class="ccr-radio-group">
            <label><input type="radio" name="dealer" value="yes" checked> Yes</label>
            <label><input type="radio" name="tsumo" value="no"> No</label>
          </div>
        </div>

        <div class="ccr-form-group">
          <label for="honba">Honba on the table</label>
          <input type="number" id="honba" min="0" max="19" value="0">
          <div class="ccr-error" id="honba-error"></div>
        </div>

        <div class="ccr-form-group">
          <label for="han">Han</label>
          <input type="number" id="han" min="1" max="59" value="1">
          <div class="ccr-error" id="han-error"></div>
        </div>

        <div class="ccr-form-group" id="fu-group">
          <label for="fu">Fu</label>
          <select id="fu">
            <option value="20">20</option>
            <option value="25">25</option>
            <option value="30">30</option>
            <option value="40">40</option>
            <option value="50">50</option>
            <option value="60">60</option>
            <option value="70">70</option>
            <option value="80">80</option>
            <option value="90">90</option>
            <option value="100">100</option>
            <option value="120">120</option>
            <option value="130">130</option>
            <option value="140">140</option>
          </select>
          <div class="ccr-error" id="fu-error"></div>
        </div>

        <div class="ccr-form-group ccr-hidden" id="yakuman-group">
          <label for="yakuman">Yakuman type</label>
          <select id="yakuman">
            <option value="counted yakuman">Counted yakuman</option>
            <option value="single yakuman">Single yakuman</option>
            <option value="double yakuman">Double yakuman</option>
          </select>
        </div>

        <button class="ccr-button" onclick="ccr_calculateScore()">Calculate Score</button>
      </div>

      <div id="ccr-results" class="ccr-result-card">
        <div class="ccr-result-title">Your win</div>
        <div class="ccr-result-value" id="ccr-win-type"></div>
        <div class="ccr-result-details">
          <div id="ccr-hand-info"></div>
          <div style="margin-top: 1rem;"><strong>Payment:</strong></div>
          <div id="ccr-payment-info"></div>
        </div>
      </div>
    </div>

    <script>
      const ccr_validHanAmounts = Array.from({length: 59}, (_, i) => i + 1);
      const ccr_validFuAmounts = ["20","25","30","40","50","60","70","80","90","100","120","130","140"];
      const ccr_validHonbaAmounts = Array.from({length: 20}, (_, i) => i);

      document.getElementById('han').addEventListener('change', function() {
        const han = parseInt(this.value);
        const fuGroup = document.getElementById('fu-group');
        const yakumanGroup = document.getElementById('yakuman-group');
        if (han >= 13) { fuGroup.classList.add('ccr-hidden'); yakumanGroup.classList.remove('ccr-hidden'); }
        else if (han >= 5) { fuGroup.classList.add('ccr-hidden'); yakumanGroup.classList.add('ccr-hidden'); }
        else { fuGroup.classList.remove('ccr-hidden'); yakumanGroup.classList.add('ccr-hidden'); }
      });

      function ccr_roundUp100(x) { return Math.ceil(x / 100) * 100; }

      function ccr_typeAndPoints(han, fu) {
        let handType, basicPoints;
        if (han >= 13) {
          const yakumanType = document.getElementById('yakuman').value;
          handType = yakumanType;
          basicPoints = yakumanType === "double yakuman" ? 16000 : 8000;
        } else if (han >= 11) { handType = "sanbaiman"; basicPoints = 6000; }
        else if (han >= 8) { handType = "baiman"; basicPoints = 4000; }
        else if (han >= 6) { handType = "haneman"; basicPoints = 3000; }
        else if (han >= 5 || (han === 4 && fu >= 30) || (han === 3 && fu >= 60)) { handType = "mangan"; basicPoints = 2000; }
        else { handType = "normal"; basicPoints = fu * Math.pow(2, 2 + han); }
        return { handType, basicPoints };
      }

      function ccr_paymentCalc(basicPoints, dealer, tsumo, honba) {
        let winType, payment;
        if (dealer) {
          if (tsumo) { winType = "Dealer tsumo"; payment = (ccr_roundUp100(2 * basicPoints) + 100 * honba) + " from each player"; }
          else { winType = "Dealer ron"; payment = (ccr_roundUp100(6 * basicPoints) + 300 * honba) + " from the discarder"; }
        } else {
          if (tsumo) {
            winType = "Non-dealer tsumo";
            const nonDealerPay = ccr_roundUp100(basicPoints) + 100 * honba;
            const dealerPay = ccr_roundUp100(2 * basicPoints) + 100 * honba;
            payment = nonDealerPay + " from each non-dealer, " + dealerPay + " from the dealer";
          } else { winType = "Non-dealer ron"; payment = (ccr_roundUp100(4 * basicPoints) + 300 * honba) + " from the discarder"; }
        }
        return { winType, payment };
      }

      function ccr_calculateScore() {
        document.querySelectorAll('.ccr-error').forEach(el => { el.textContent = ''; el.classList.remove('show'); });
        const dealer = document.querySelector('input[name="dealer"]:checked').value === 'yes';
        const tsumo = document.querySelector('input[name="tsumo"]:checked').value === 'yes';
        const honba = parseInt(document.getElementById('honba').value);
        const han = parseInt(document.getElementById('han').value);
        const fu = han < 5 ? parseInt(document.getElementById('fu').value) : 20;
        let valid = true;
        if (!ccr_validHanAmounts.includes(han)) { document.getElementById('han-error').textContent = 'Valid han: 1-59'; document.getElementById('han-error').classList.add('show'); valid = false; }
        if (!ccr_validHonbaAmounts.includes(honba)) { document.getElementById('honba-error').textContent = 'Valid honba: 0-19'; document.getElementById('honba-error').classList.add('show'); valid = false; }
        if (han < 5 && !ccr_validFuAmounts.includes(fu.toString())) { document.getElementById('fu-error').textContent = 'Select a valid fu'; document.getElementById('fu-error').classList.add('show'); valid = false; }
        if (!valid) return;
        const { handType, basicPoints } = ccr_typeAndPoints(han, fu);
        const { winType, payment } = ccr_paymentCalc(basicPoints, dealer, tsumo, honba);
        document.getElementById('ccr-win-type').textContent = winType;
        document.getElementById('ccr-hand-info').textContent = handType === 'normal' ? han + ' han, ' + fu + ' fu; ' + honba + ' honba' : handType.charAt(0).toUpperCase() + handType.slice(1) + ', ' + honba + ' honba';
        document.getElementById('ccr-payment-info').textContent = payment;
        document.getElementById('ccr-results').classList.add('show');
      }

      document.addEventListener('keypress', function(e) { if (e.key === 'Enter') ccr_calculateScore(); });
    </script>
